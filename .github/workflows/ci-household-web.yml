name: CI - household-web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/household-web/**"
      - "packages/supabase/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".nvmrc"
      - ".github/workflows/ci-household-web.yml"
      - ".github/actions/setup/**"
  pull_request:
    paths:
      - "apps/household-web/**"
      - "packages/supabase/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".nvmrc"
      - ".github/workflows/ci-household-web.yml"
      - ".github/actions/setup/**"

permissions:
  contents: read

# 同一 PR で連続 push した場合、古い run をキャンセルする（main への push はキャンセルしない）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Typecheck / Lint / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Typecheck (packages/supabase)
        run: pnpm --filter @personal-hub/supabase typecheck

      - name: Typecheck
        run: pnpm --filter household-web typecheck

      - name: Lint
        run: pnpm --filter household-web lint

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/household-web/.next/cache
          key: nextjs-household-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/household-web/**/*.ts', 'apps/household-web/**/*.tsx') }}
          restore-keys: |
            nextjs-household-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm --filter household-web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
